spring.application.name=Agendamente-Servicos-carro

# ============================================================
# Banco de dados PostgreSQL - Supabase (tabelas de negócio)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/agendamento_carros
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Executar data.sql ao iniciar (INSERT ON CONFLICT DO NOTHING para idempotência)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# H2 console desabilitado em produção (habilitado apenas no perfil dev)
spring.h2.console.enabled=false
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=agendamento_veic
