# ============================================================
# Perfil de desenvolvimento local — H2 em memória
# Ativo com: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# Não requer Supabase nem MongoDB disponíveis.
# ============================================================

# Substitui Supabase por H2 em memória
spring.datasource.url=jdbc:h2:mem:oficina;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Dialect (H2 detecta sozinho — limpa o PostgreSQL herdado)
spring.jpa.database-platform=

# Recria as tabelas a cada restart
spring.jpa.hibernate.ddl-auto=create-drop

# Popula com data-dev.sql (compatível com H2)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-dev.sql
spring.jpa.defer-datasource-initialization=true

# Console H2 em http://localhost:8080/h2-console/
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Desliga MongoDB no perfil dev
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# Logs SQL no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
